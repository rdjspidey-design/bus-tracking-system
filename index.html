<!DOCTYPE html>
<html>
<head>
    <title>College Bus Tracking - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">    
<h1>🚍 College Bus Tracking System (Admin)</h1>

<hr>

<h2>Add Route</h2>
<form method="POST">
    <input type="text" name="route_name" placeholder="Enter Route Name" required>
    <button type="submit">Add Route</button>
</form>

<hr>

<h2>Add Bus</h2>
<form method="POST">
    <input type="text" name="bus_number" placeholder="Enter Bus Number" required>

    <select name="route_id" required>
        <option value="">Select Route</option>
        {% for route in routes %}
            <option value="{{ route[0] }}">{{ route[1] }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Bus</button>
</form>

<hr>

<h2>Add Student</h2>
<form method="POST">
    <input type="text" name="student_name" placeholder="Student Name" required>
    <input type="text" name="register_number" placeholder="Register Number" required>
    <input type="password" name="password" placeholder="Password" required>

    <select name="route_id" required>
        <option value="">Select Route</option>
        {% for route in routes %}
            <option value="{{ route[0] }}">{{ route[1] }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Student</button>
</form>

<hr>

<h2>Bus List</h2>
<ul>
    {% for bus in buses %}
        <li>Bus {{ bus[0] }} - Route: {{ bus[1] }}</li>
    {% endfor %}
</ul>

<br>
<a href="/login">Go to Student Login</a>

<br>
<a href="/buses">View All Buses</a>

</body>
</html>
