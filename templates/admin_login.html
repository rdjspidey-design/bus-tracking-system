<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
  <style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:40px;
}

h1,h2{
    color:#333;
}

input,select,button{
    padding:8px;
    margin:5px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.container{
    background:white;
    padding:20px;
    border-radius:8px;
    width:500px;
}
</style>
</head>

<body>

<h2>Admin Login</h2>

<form method="POST">

<label>Username:</label>
<input type="text" name="username" required>

<br><br>

<label>Password:</label>
<input type="password" name="password" required>

<br><br>

<button type="submit">Login</button>

</form>

</body>
</html>
