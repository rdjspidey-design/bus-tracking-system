<!DOCTYPE html>
<html>
<head>
<title>Driver Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(to right,#1e3c72,#2a5298);
color:white;
text-align:center;
padding-top:50px;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

button{
margin-top:15px;
}
</style>

</head>
<body>

<div class="card">

<h2>🚍 Driver Tracking Panel</h2>

<p id="status">Click Start to begin tracking</p>

<button class="btn btn-success" onclick="startTracking()">Start Tracking</button>

<button class="btn btn-danger" onclick="stopTracking()">Stop</button>

</div>

<script>

let watchID;

function startTracking(){

if (!navigator.geolocation){
document.getElementById("status").innerHTML="GPS Not Supported ❌";
return;
}

watchID = navigator.geolocation.watchPosition(

function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

document.getElementById("status").innerHTML =
"Latitude: "+lat+"<br>Longitude: "+lng;

fetch('/update_location',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`latitude=${lat}&longitude=${lng}`
});

},

function(err){
document.getElementById("status").innerHTML="Error: "+err.message;
},

{enableHighAccuracy:true}

);

}

function stopTracking(){
navigator.geolocation.clearWatch(watchID);
document.getElementById("status").innerHTML="Tracking Stopped";
}

</script>

</body>
</html>
