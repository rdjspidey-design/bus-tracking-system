<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(to right,#1e3c72,#2a5298);
color:white;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>

</head>
<body>

<h1 class="text-center mb-4">🚍 Admin Dashboard</h1>

<div class="container">

<div class="card">
<h3>Add Route</h3>
<form method="POST">
<input class="form-control mb-2" name="route_name" placeholder="Route Name" required>
<button class="btn btn-primary">Add Route</button>
</form>
</div>

<div class="card">
<h3>Add Bus</h3>
<form method="POST">
<input class="form-control mb-2" name="bus_number" placeholder="Bus Number" required>

<select class="form-control mb-2" name="route_id" required>
<option value="">Select Route</option>
{% for r in routes %}
<option value="{{r[0]}}">{{r[1]}}</option>
{% endfor %}
</select>

<button class="btn btn-success">Add Bus</button>
</form>
</div>

<div class="card">
<h3>Add Student</h3>
<form method="POST">
<input class="form-control mb-2" name="student_name" placeholder="Name" required>
<input class="form-control mb-2" name="register_number" placeholder="Register No" required>
<input class="form-control mb-2" name="password" placeholder="Password" required>

<select class="form-control mb-2" name="bus_id" required>
<option value="">Select Bus</option>
{% for b in buses %}
<option value="{{b[0]}}">{{b[1]}}</option>
{% endfor %}
</select>

<button class="btn btn-warning">Add Student</button>
</form>
</div>

<div class="card">
<h3>Add Driver</h3>
<form method="POST">
<input class="form-control mb-2" name="driver_name" placeholder="Driver Name" required>
<input class="form-control mb-2" name="password" placeholder="Password" required>

<select class="form-control mb-2" name="bus_id" required>
<option value="">Select Bus</option>
{% for b in buses %}
<option value="{{b[0]}}">{{b[1]}}</option>
{% endfor %}
</select>

<button class="btn btn-danger">Add Driver</button>
</form>
</div>

</div>

</body>
</html>
