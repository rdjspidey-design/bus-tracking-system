<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right,#1d2671,#c33764);
            color:white;
            min-height:100vh;
        }

        .navbar{
            background: rgba(0,0,0,0.6);
        }

        .card{
            border-radius:15px;
            padding:20px;
            color:black;
            box-shadow:0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-custom{
            padding:12px;
            font-size:18px;
            border-radius:10px;
        }

        .welcome{
            margin-top:40px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">🚍 Bus Tracking System</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container welcome text-center">

    <h1>Welcome {{ name }} 👋</h1>
    <p class="mb-4">Track your assigned bus in real-time</p>

    <div class="row justify-content-center">

        <!-- TRACK CARD -->
        <div class="col-md-4">
            <div class="card">
                <h4>📍 Live Bus Tracking</h4>
                <p>See your bus moving live on map</p>
                <a href="/map" class="btn btn-success btn-custom w-100">Track Now</a>
            </div>
        </div>

   
    </div>

</div>

</body>
</html>
