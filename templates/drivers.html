<!DOCTYPE html>
<html>
<head>
<title>Driver List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(to right,#141e30,#243b55);
    color:white;
    min-height:100vh;
    padding:30px;
}

.table-container{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.btn-back{
    margin-top:20px;
}
</style>

</head>

<body>

<h2>🚗 Driver List</h2>

<div class="table-container">

<table class="table table-striped table-hover text-center">
<thead class="table-dark">
<tr>
<th>Driver Name</th>
<th>Bus</th>
</tr>
</thead>

<tbody>
{% for d in drivers %}
<tr>
<td>{{ d[0] }}</td>
<td>{{ d[1] if d[1] else "Not Assigned" }}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

<div class="text-center">
<a href="/admin" class="btn btn-light btn-back">⬅ Back</a>
</div>

</body>
</html>
